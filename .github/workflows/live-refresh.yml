# Keeps the living feeds fresh between weekly briefs: auto-ingested
# incidents (ReCAAP + IMB), active NAVAREA warnings and the wire snapshot.
# Every 6 hours; commits only when something actually changed, and the
# push triggers the site deployment.
name: live-refresh
on:
  schedule:
    - cron: "40 */6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-incidents-live.mjs
      - run: node scripts/fetch-navarea.mjs
      - run: node scripts/fetch-wire.mjs
      # 2-min listening session -> ghost picture that fills the live maps instantly
      - run: node scripts/fetch-ais-seed.mjs 120
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
      - name: commit & push if changed
        run: |
          git config user.name "le-phare-bot"
          git config user.email "le-phare-bot@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || { git commit -m "data: live refresh (incidents, warnings, wire)"; git push; }
